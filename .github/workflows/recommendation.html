<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyExpense Tracker - Stock Recommendations</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">

</head>
<body class="page-bg">
    <div class="bg-nav d-flex align-items-center justify-content-between p-2 border-bottom">
        <!-- Left Section: Title and Navigation -->
        <div class="d-flex align-items-center">
          <h5 class="m-0 mr-4 font-weight-normal">
            <a href="/" style="text-decoration: none; color:0F2027;">MyExpenseApp</a>
          </h5>
          <nav class="d-flex">
            <a class="py-2 px-3 text-dark" href="/home">Home</a>
            <a class="py-2 px-3 text-dark" href="/analysis">Analysis</a>
            <a class="py-2 px-3 text-dark" href="/recommendation">Stock Suggestions</a>
            <a class="py-2 px-3 text-dark" href="/contact">Contact Us</a>
          </nav>
        </div>
      
        <!-- Right Section: Profile Icon and Logout Button -->
        <div class="d-flex align-items-center">
            <a class="text-dark py-2 px-3" href="/profile" style="text-decoration:none;">  
                <span>{{ user_name }}</span>  <i class="fas fa-user-circle" style="font-size: 1.5rem;"></i>
            </a>
            <a class="btn btn-outline-danger py-2 px-3" href="/logout">Logout</a>
        </div>
      </div>
 <div>
    {% for message in get_flashed_messages() %}
     <div class="alert alert-warning alert-dismissible fade show" id="alert" role="alert">
                {{ message }}
        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
        <span aria-hidden="true">&times;</span>
        </button>
    </div>
     {% endfor %}
 </div>
    <div class="container">
        <h2 class="mt-4 section-title text-center" style="color:white;">Stock Recommendations</h2>
         <!-- Stock Suggestion Form -->
         <div class="card p-4 bg-dark text-white shadow-lg">
            <h5 class="text-center">Get Stock Suggestions</h5>
            <form id="stockSuggestionForm" class="mt-3">
                <div class="form-group">
                    <label for="risk_tolerance">Risk Tolerance:</label>
                    <select id="risk_tolerance" name="risk_tolerance" class="form-control" required>
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="investment_amount">Investment Amount:</label>
                    <input type="number" id="investment_amount" name="investment_amount" class="form-control" placeholder="Enter Amount" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Get Suggestions</button>
            </form>
        </div>
        <div class="row mt-4">
            <div class="col-md-12">
                <ul id="recommendationsList" class="list-group">
                    <!-- Stock recommendations will be inserted here dynamically -->
                </ul>
            </div>
        </div>
    </div>
    <script>
        document.getElementById("stockSuggestionForm").addEventListener("submit", function (e) {
            e.preventDefault();

            const form = e.target;
            const formData = new FormData(form);
            const riskTolerance = formData.get("risk_tolerance");
            const investmentAmount = formData.get("investment_amount");

            fetch("/suggest-stocks", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    risk_tolerance: riskTolerance,
                    investment_amount: investmentAmount
                })
            })
            .then(response => response.json())
            .then(data => {
                const recommendationsList = document.getElementById("recommendationsList");
                recommendationsList.innerHTML = ""; // Clear previous results

                if (data.suggestions && data.suggestions.length > 0) {
                    data.suggestions.forEach(rec => {
                        const listItem = `
                            <li class="list-group-item card green my-3">
                                <h5><b>${rec.stock}</b></h5>
                                <p><strong>Avg. Price:</strong> ${rec.avg_price}</p>
                                <p><strong>Est. Quantity:</strong> ${rec.investment_estimate}</p>
                                <p><strong>Capital:</strong> ${rec.capital}</p>
                                <p><strong>Charts:</strong> <a href="${rec.chart_url}" target="_blank">View Chart</a></p>
                                <p><strong>Analysis:</strong> ${rec.analysis}</p>
                                <p><strong>Pre-High Low:</strong> ${rec.pre_high_low}</p>
                                <p><strong>PE Ratio:</strong> ${rec.pe_ratio}</p>
                            </li>
                        `;
                        recommendationsList.innerHTML += listItem;
                    });
                } else {
                    recommendationsList.innerHTML = `<p class="text-center text-white">No stock suggestions available. Try again with different inputs.</p>`;
                }
            })
            .catch(error => {
                console.error("Error fetching stock suggestions:", error);
            });
        });
    </script>
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
